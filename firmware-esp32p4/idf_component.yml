## ai-trap ESP32-P4 — managed component dependencies
## Run `idf.py add-dependency` or let the build fetch these automatically.

dependencies:
  idf: ">=5.3.0"

  ## ESP-DL: on-device AI inference (ESPDet-Pico model, ESP-PPQ quantization)
  espressif/esp-dl:
    version: ">=2.0.0"
    rules:
      - if: "idf_version >= 5.3"

  ## ESP-Detection: high-level YOLO detector wrapper around ESP-DL
  espressif/esp-detection:
    version: ">=1.0.0"

  ## ESP camera sensor driver (OV5647 MIPI CSI-2)
  espressif/esp_cam_sensor:
    version: ">=0.5.0"
