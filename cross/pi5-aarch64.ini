# ─────────────────────────────────────────────────────────────────────────────
#  Meson cross-compilation file — Raspberry Pi 5 (BCM2712, Cortex-A76)
#
#  Target:    ARM64 / AArch64, glibc, hard-float
#  Toolchain: aarch64-linux-gnu (Ubuntu gcc-aarch64-linux-gnu package)
#
#  ── Prerequisites ─────────────────────────────────────────────────────────
#
#  1. Install the cross toolchain and aarch64 libcamera:
#
#       sudo apt-get install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
#         binutils-aarch64-linux-gnu cmake ninja-build meson pkg-config
#
#       sudo dpkg --add-architecture arm64
#       sudo apt-get update
#       sudo apt-get install libcamera-dev:arm64
#
#  2. Build NCNN and SQLite3 into a staging sysroot, e.g. /opt/pi5-sysroot:
#
#       SYSROOT=/opt/pi5-sysroot
#       CROSS=aarch64-linux-gnu
#       FLAGS="-march=armv8.2-a+dotprod+fp16 -mtune=cortex-a76 -O2"
#
#       # SQLite3
#       curl -O https://www.sqlite.org/2024/sqlite-autoconf-3450100.tar.gz
#       tar xf sqlite-autoconf-3450100.tar.gz && cd sqlite-autoconf-3450100
#       ./configure --host=$CROSS --prefix=/usr \
#                   --enable-static --disable-shared \
#                   CC=${CROSS}-gcc CFLAGS="$FLAGS"
#       make -j$(nproc) && make DESTDIR=$SYSROOT install
#       cd ..
#
#       # NCNN
#       git clone --depth 1 https://github.com/Tencent/ncnn.git
#       cmake -S ncnn -B ncnn-build \
#         -DCMAKE_SYSTEM_NAME=Linux \
#         -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
#         -DCMAKE_C_COMPILER=${CROSS}-gcc \
#         -DCMAKE_CXX_COMPILER=${CROSS}-g++ \
#         -DCMAKE_C_FLAGS="$FLAGS" \
#         -DCMAKE_CXX_FLAGS="$FLAGS" \
#         -DCMAKE_INSTALL_PREFIX=$SYSROOT/usr \
#         -DNCNN_TARGET_ARCH=aarch64 \
#         -DNCNN_BUILD_TESTS=OFF \
#         -DNCNN_BUILD_EXAMPLES=OFF \
#         -DNCNN_BUILD_TOOLS=OFF \
#         -DNCNN_VULKAN=OFF \
#         -DNCNN_SHARED_LIB=OFF \
#         -DNCNN_BUILD_BENCHMARK=OFF \
#         -DCMAKE_BUILD_TYPE=Release
#       cmake --build ncnn-build -j$(nproc) && cmake --install ncnn-build
#
#  3. Create the pkg-config wrapper:
#
#       sudo tee /usr/local/bin/aarch64-linux-gnu-pkg-config > /dev/null <<'EOF'
#       #!/bin/bash
#       export PKG_CONFIG_DIR=
#       export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/opt/pi5-sysroot/usr/lib/pkgconfig
#       exec pkg-config "$@"
#       EOF
#       sudo chmod +x /usr/local/bin/aarch64-linux-gnu-pkg-config
#
#  4. Build:
#
#       meson setup build-pi5 \
#         --cross-file cross/pi5-aarch64.ini \
#         -Dtarget=libcamera \
#         -Dpi5_sysroot=/opt/pi5-sysroot \
#         --buildtype=release
#       ninja -C build-pi5
#
#  5. Deploy:
#
#       aarch64-linux-gnu-strip build-pi5/yolo_libcamera
#       scp build-pi5/yolo_libcamera pi@<pi-ip>:/opt/trap/
#
# ─────────────────────────────────────────────────────────────────────────────

[binaries]
c          = 'aarch64-linux-gnu-gcc'
cpp        = 'aarch64-linux-gnu-g++'
ar         = 'aarch64-linux-gnu-ar'
strip      = 'aarch64-linux-gnu-strip'
objcopy    = 'aarch64-linux-gnu-objcopy'
pkg-config = '/usr/local/bin/aarch64-linux-gnu-pkg-config'

[host_machine]
system     = 'linux'
cpu_family = 'aarch64'
cpu        = 'cortex-a76'
endian     = 'little'

[properties]
pkg_config_libdir = '/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig'
cmake_prefix_path = ['/usr/lib/aarch64-linux-gnu']
