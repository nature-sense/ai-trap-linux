# ─────────────────────────────────────────────────────────────────────────────
#  Meson cross-compilation file — Luckfox Pico Zero (RV1106G3, Cortex-A7)
#
#  Target:   ARM Cortex-A7, hard-float, NEON, uClibc
#  Toolchain: arm-rockchip830-linux-uclibcgnueabihf (from Luckfox SDK)
#
#  ── Prerequisites ─────────────────────────────────────────────────────────
#
#  1. Clone and install the Luckfox SDK toolchain:
#
#       git clone https://github.com/LuckfoxTECH/luckfox-pico.git
#       cd luckfox-pico
#       source env_install_toolchain.sh
#
#     This adds  luckfox-pico/tools/linux/toolchain/
#                  arm-rockchip830-linux-uclibcgnueabihf/bin/
#     to your PATH.  Keep that shell session open (or re-source it) when
#     invoking meson/ninja.
#
#  2. Cross-compile NCNN and SQLite3 for the target, then install them into
#     a staging sysroot, e.g. /opt/luckfox-sysroot :
#
#       SYSROOT=/opt/luckfox-sysroot
#       CROSS=arm-rockchip830-linux-uclibcgnueabihf
#
#       # SQLite3 (amalgamation build — simplest)
#       curl -O https://www.sqlite.org/2024/sqlite-autoconf-3450100.tar.gz
#       tar xf sqlite-autoconf-3450100.tar.gz && cd sqlite-autoconf-3450100
#       ./configure --host=$CROSS --prefix=/usr \
#                   CC=${CROSS}-gcc CFLAGS="-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard"
#       make -j$(nproc)
#       make DESTDIR=$SYSROOT install
#       cd ..
#
#       # NCNN
#       git clone --depth 1 https://github.com/Tencent/ncnn.git
#       cmake -S ncnn -B ncnn-build \
#         -DCMAKE_TOOLCHAIN_FILE=ncnn/toolchains/arm-linux-gnueabihf.toolchain.cmake \
#         -DCMAKE_C_COMPILER=${CROSS}-gcc \
#         -DCMAKE_CXX_COMPILER=${CROSS}-g++ \
#         -DCMAKE_INSTALL_PREFIX=$SYSROOT/usr \
#         -DNCNN_TARGET_ARCH=arm \
#         -DNCNN_BUILD_TESTS=OFF \
#         -DNCNN_BUILD_EXAMPLES=OFF \
#         -DNCNN_BUILD_TOOLS=OFF \
#         -DNCNN_VULKAN=OFF \
#         -DNCNN_BUILD_BENCHMARK=OFF \
#         -DCMAKE_BUILD_TYPE=Release
#       cmake --build ncnn-build -j$(nproc)
#       cmake --install ncnn-build
#
#  3. Set LUCKFOX_SYSROOT in your environment and run meson:
#
#       export LUCKFOX_SYSROOT=/opt/luckfox-sysroot
#       meson setup build-luckfox \
#         --cross-file cross/luckfox-rv1106.ini \
#         -Dtarget=v4l2
#       ninja -C build-luckfox
#
#  4. Strip and deploy the binary:
#
#       arm-rockchip830-linux-uclibcgnueabihf-strip build-luckfox/yolo_v4l2
#       scp build-luckfox/yolo_v4l2 root@<board-ip>:/opt/trap/
#
# ─────────────────────────────────────────────────────────────────────────────

[binaries]
c           = '/home/ubuntu/arm-rockchip830-linux-uclibcgnueabihf/bin/arm-rockchip830-linux-uclibcgnueabihf-gcc'
cpp         = '/home/ubuntu/arm-rockchip830-linux-uclibcgnueabihf/bin/arm-rockchip830-linux-uclibcgnueabihf-g++'
ar          = '/home/ubuntu/arm-rockchip830-linux-uclibcgnueabihf/bin/arm-rockchip830-linux-uclibcgnueabihf-ar'
strip       = '/home/ubuntu/arm-rockchip830-linux-uclibcgnueabihf/bin/arm-rockchip830-linux-uclibcgnueabihf-strip'
objcopy     = '/home/ubuntu/arm-rockchip830-linux-uclibcgnueabihf/bin/arm-rockchip830-linux-uclibcgnueabihf-objcopy'
# Use the host pkg-config but redirect it to the sysroot via PKG_CONFIG_LIBDIR
# (set automatically by meson from the [properties] section below).
pkg-config  = 'pkg-config'

[host_machine]
system      = 'linux'
cpu_family  = 'arm'
cpu         = 'cortex-a7'
endian      = 'little'

[properties]
# Path to the staging sysroot containing cross-compiled headers and libs.
# Override at configure time:
#   meson setup ... -Dluckfox_sysroot=/your/path
# or set LUCKFOX_SYSROOT in the environment before running the build wrapper.
sys_root            = '/opt/luckfox-sysroot'
pkg_config_libdir   = '/opt/luckfox-sysroot/usr/lib/pkgconfig:/opt/luckfox-sysroot/usr/share/pkgconfig'
