<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 700" width="940" height="700"
     font-family="'Segoe UI', system-ui, sans-serif" font-size="11">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#546e7a"/>
    </marker>
    <marker id="arr-w" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#90a4ae"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- ── Page background ──────────────────────────────────────────────── -->
  <rect width="940" height="700" fill="#eceff1"/>

  <!-- ── Title ────────────────────────────────────────────────────────── -->
  <text x="470" y="28" text-anchor="middle" font-size="17" font-weight="700"
        fill="#1a237e" letter-spacing="0.5">AI Wildlife Trap — System Architecture</text>

  <!-- ════════════════════════════════════════════════════════════════════
       TRAP DEVICE outer box
       ════════════════════════════════════════════════════════════════════ -->
  <rect x="18" y="42" width="904" height="508" rx="14"
        fill="#f5f7fa" stroke="#90a4ae" stroke-width="2" filter="url(#shadow)"/>
  <rect x="18" y="42" width="904" height="32" rx="14" fill="#37474f"/>
  <rect x="18" y="58"  width="904" height="16" fill="#37474f"/><!-- square bottom corners on top bar -->
  <text x="36" y="63" font-size="12" font-weight="700" fill="white">TRAP DEVICE</text>
  <text x="160" y="63" font-size="10" fill="#b0bec5">
    Raspberry Pi 5 (BCM2712 · libcamera · aarch64)
    <tspan fill="#78909c">  /  </tspan>
    Luckfox Pico Zero (RV1106G3 · V4L2 · Cortex-A7 uClibc)
  </text>

  <!-- ════════════════════════════════════════════════════════════════════
       ROW 1 — Camera pipeline  (y 88 → 208)
       ════════════════════════════════════════════════════════════════════ -->

  <!-- CAMERA SENSOR -->
  <rect x="36"  y="88" width="138" height="115" rx="9"
        fill="#1565c0" stroke="#0d47a1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="108" text-anchor="middle" font-weight="700" fill="white">CAMERA</text>
  <line x1="52" y1="114" x2="158" y2="114" stroke="#90caf9" stroke-width="0.6" opacity="0.5"/>
  <text x="105" y="128" text-anchor="middle" fill="#bbdefb">IMX708 (Pi 5)</text>
  <text x="105" y="142" text-anchor="middle" fill="#bbdefb">IMX415 (Luckfox)</text>
  <text x="105" y="158" text-anchor="middle" font-size="9.5" fill="#90caf9">2304×1296 / 1920×1080</text>
  <text x="105" y="172" text-anchor="middle" font-size="9.5" fill="#90caf9">30 fps  ·  NV12</text>
  <text x="105" y="188" text-anchor="middle" font-size="9" fill="#64b5f6">IR-CUT filter control</text>

  <!-- arrow: Camera → Capture -->
  <line x1="174" y1="145" x2="198" y2="145" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CAPTURE -->
  <rect x="198" y="100" width="148" height="90" rx="9"
        fill="#1976d2" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="272" y="120" text-anchor="middle" font-weight="700" fill="white">CAPTURE</text>
  <line x1="212" y1="126" x2="332" y2="126" stroke="#90caf9" stroke-width="0.6" opacity="0.5"/>
  <text x="272" y="141" text-anchor="middle" fill="#bbdefb">libcamera  (Pi 5)</text>
  <text x="272" y="156" text-anchor="middle" fill="#bbdefb">V4L2 / RKISP  (Luckfox)</text>
  <text x="272" y="172" text-anchor="middle" font-size="9.5" fill="#90caf9">CaptureFrame struct</text>

  <!-- arrow: Capture → NCNN -->
  <line x1="346" y1="145" x2="372" y2="145" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NCNN INFERENCE -->
  <rect x="372" y="88" width="158" height="115" rx="9"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="451" y="108" text-anchor="middle" font-weight="700" fill="white">INFERENCE</text>
  <line x1="388" y1="114" x2="514" y2="114" stroke="#a5d6a7" stroke-width="0.6" opacity="0.5"/>
  <text x="451" y="129" text-anchor="middle" fill="#c8e6c9">NCNN · YOLO11n</text>
  <text x="451" y="144" text-anchor="middle" fill="#c8e6c9">320 × 320 input</text>
  <text x="451" y="159" text-anchor="middle" font-size="9.5" fill="#a5d6a7">NEON FP16 · static lib</text>
  <text x="451" y="173" text-anchor="middle" font-size="9.5" fill="#a5d6a7">anchor-grid decoder</text>
  <text x="451" y="187" text-anchor="middle" font-size="9" fill="#81c784">NMS  conf≥0.45</text>

  <!-- arrow: NCNN → Tracker -->
  <line x1="530" y1="145" x2="556" y2="145" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BYTETRACKER -->
  <rect x="556" y="100" width="148" height="90" rx="9"
        fill="#388e3c" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="630" y="120" text-anchor="middle" font-weight="700" fill="white">TRACKER</text>
  <line x1="570" y1="126" x2="690" y2="126" stroke="#a5d6a7" stroke-width="0.6" opacity="0.5"/>
  <text x="630" y="141" text-anchor="middle" fill="#c8e6c9">ByteTracker</text>
  <text x="630" y="156" text-anchor="middle" fill="#c8e6c9">IoU + Kalman filter</text>
  <text x="630" y="172" text-anchor="middle" font-size="9.5" fill="#a5d6a7">track ID · confirmed</text>

  <!-- arrow: Tracker → CropSaver -->
  <line x1="704" y1="145" x2="730" y2="145" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CROP SAVER -->
  <rect x="730" y="88" width="168" height="115" rx="9"
        fill="#ef6c00" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="814" y="108" text-anchor="middle" font-weight="700" fill="white">CROP SAVER</text>
  <line x1="746" y1="114" x2="882" y2="114" stroke="#ffe0b2" stroke-width="0.6" opacity="0.5"/>
  <text x="814" y="129" text-anchor="middle" fill="#ffe0b2">JPEG encode  (stb)</text>
  <text x="814" y="144" text-anchor="middle" fill="#ffe0b2">EXIF GPS tagging</text>
  <text x="814" y="159" text-anchor="middle" font-size="9.5" fill="#ffcc80">conf threshold  ·  dedup</text>
  <text x="814" y="173" text-anchor="middle" font-size="9.5" fill="#ffcc80">max saves / track</text>
  <text x="814" y="187" text-anchor="middle" font-size="9" fill="#ffa726">async write queue</text>

  <!-- ════════════════════════════════════════════════════════════════════
       ROW 2 — Storage + Sync  (y 230 → 340)
       ════════════════════════════════════════════════════════════════════ -->

  <!-- arrow: CropSaver ↓ to Storage -->
  <line x1="814" y1="203" x2="814" y2="228" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- arrow: CropSaver ↓ to SyncManager -->
  <line x1="770" y1="203" x2="630" y2="228" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STORAGE -->
  <rect x="730" y="228" width="168" height="105" rx="9"
        fill="#6a1b9a" stroke="#4a148c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="814" y="248" text-anchor="middle" font-weight="700" fill="white">STORAGE</text>
  <line x1="746" y1="254" x2="882" y2="254" stroke="#e1bee7" stroke-width="0.6" opacity="0.5"/>
  <text x="814" y="268" text-anchor="middle" fill="#e1bee7">SQLite · detections.db</text>
  <text x="814" y="283" text-anchor="middle" fill="#e1bee7">crops/  JPEG files</text>
  <text x="814" y="298" text-anchor="middle" font-size="9.5" fill="#ce93d8">track · label · conf · GPS</text>
  <text x="814" y="312" text-anchor="middle" font-size="9.5" fill="#ce93d8">temperature · humidity</text>
  <text x="814" y="326" text-anchor="middle" font-size="9" fill="#ba68c8">session-based directories</text>

  <!-- SYNC MANAGER -->
  <rect x="556" y="228" width="148" height="105" rx="9"
        fill="#ad1457" stroke="#880e4f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="630" y="248" text-anchor="middle" font-weight="700" fill="white">SYNC MANAGER</text>
  <line x1="570" y1="254" x2="690" y2="254" stroke="#f8bbd0" stroke-width="0.6" opacity="0.5"/>
  <text x="630" y="268" text-anchor="middle" fill="#f8bbd0">/api/sync/session</text>
  <text x="630" y="283" text-anchor="middle" fill="#f8bbd0">/api/sync/ack</text>
  <text x="630" y="298" text-anchor="middle" font-size="9.5" fill="#f48fb1">DELETE /api/sync/session</text>
  <text x="630" y="312" text-anchor="middle" font-size="9.5" fill="#f48fb1">batch transfer + ack</text>
  <text x="630" y="326" text-anchor="middle" font-size="9" fill="#f06292">auto-delete after ack</text>

  <!-- ════════════════════════════════════════════════════════════════════
       ROW 3 — API Servers  (y 360 → 480)
       ════════════════════════════════════════════════════════════════════ -->

  <!-- vertical connector: SyncMgr → HTTP API row -->
  <line x1="630" y1="333" x2="630" y2="358" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <!-- vertical connector: Storage → HTTP API row -->
  <line x1="814" y1="333" x2="814" y2="358" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- HTTP API -->
  <rect x="36"  y="358" width="200" height="110" rx="9"
        fill="#c62828" stroke="#b71c1c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="136" y="378" text-anchor="middle" font-weight="700" fill="white">HTTP API  · :8080</text>
  <line x1="52"  y1="384" x2="220" y2="384" stroke="#ffcdd2" stroke-width="0.6" opacity="0.5"/>
  <text x="136" y="398" text-anchor="middle" fill="#ffcdd2">/api/trap  /api/status</text>
  <text x="136" y="412" text-anchor="middle" fill="#ffcdd2">/api/capture  /api/crops</text>
  <text x="136" y="426" text-anchor="middle" fill="#ffcdd2">/api/wifi  /api/wifi/reset</text>
  <text x="136" y="440" text-anchor="middle" font-size="9.5" fill="#ef9a9a">/api/config/location  /api/af/trigger</text>
  <text x="136" y="454" text-anchor="middle" font-size="9" fill="#e57373">CORS · JSON · single-threaded</text>

  <!-- SSE Server -->
  <rect x="258" y="358" width="188" height="110" rx="9"
        fill="#d84315" stroke="#bf360c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="352" y="378" text-anchor="middle" font-weight="700" fill="white">SSE EVENTS  · :8081</text>
  <line x1="274" y1="384" x2="430" y2="384" stroke="#ffccbc" stroke-width="0.6" opacity="0.5"/>
  <text x="352" y="398" text-anchor="middle" fill="#ffccbc">detection-event</text>
  <text x="352" y="412" text-anchor="middle" fill="#ffccbc">crop-saved</text>
  <text x="352" y="426" text-anchor="middle" fill="#ffccbc">capture-state</text>
  <text x="352" y="442" text-anchor="middle" font-size="9.5" fill="#ffab91">server-sent events</text>
  <text x="352" y="457" text-anchor="middle" font-size="9" fill="#ff8a65">real-time push  ·  up to 8 clients</text>

  <!-- MJPEG Streamer -->
  <rect x="468" y="358" width="188" height="110" rx="9"
        fill="#bf360c" stroke="#b71c1c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="562" y="378" text-anchor="middle" font-weight="700" fill="white">MJPEG STREAM  · :9000</text>
  <line x1="484" y1="384" x2="640" y2="384" stroke="#ffccbc" stroke-width="0.6" opacity="0.5"/>
  <text x="562" y="398" text-anchor="middle" fill="#ffccbc">live video preview</text>
  <text x="562" y="412" text-anchor="middle" fill="#ffccbc">640 × 480  ·  JPEG 75%</text>
  <text x="562" y="428" text-anchor="middle" font-size="9.5" fill="#ffab91">multi-client  ·  async frame push</text>
  <text x="562" y="443" text-anchor="middle" font-size="9.5" fill="#ffab91">always-on (independent of capture)</text>
  <text x="562" y="457" text-anchor="middle" font-size="9" fill="#ff8a65">NV12 → JPEG per frame</text>

  <!-- Sync / Storage API boxes connect into HTTP API row via horizontal line -->
  <line x1="556" y1="413" x2="448" y2="413" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="730" y1="413" x2="656" y2="413" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Grouped API box (Storage+Sync feeds) -->
  <rect x="660" y="358" width="242" height="110" rx="9"
        fill="#283593" stroke="#1a237e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="781" y="378" text-anchor="middle" font-weight="700" fill="white">STORAGE  SYNC  DB</text>
  <line x1="676" y1="384" x2="886" y2="384" stroke="#c5cae9" stroke-width="0.6" opacity="0.5"/>
  <text x="781" y="399" text-anchor="middle" fill="#c5cae9">SQLite  ·  detections.db</text>
  <text x="781" y="414" text-anchor="middle" fill="#c5cae9">crops/  JPEG sessions</text>
  <text x="781" y="429" text-anchor="middle" font-size="9.5" fill="#9fa8da">SyncManager  →  HTTP API</text>
  <text x="781" y="444" text-anchor="middle" font-size="9.5" fill="#9fa8da">/api/sync/*  manifest + ack</text>
  <text x="781" y="458" text-anchor="middle" font-size="9" fill="#7986cb">auto-delete after phone acks</text>

  <!-- ════════════════════════════════════════════════════════════════════
       WIFI MANAGER row  (y 490 → 540)
       ════════════════════════════════════════════════════════════════════ -->

  <rect x="36" y="490" width="868" height="48" rx="9"
        fill="#006064" stroke="#004d40" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="510" text-anchor="middle" font-weight="700" fill="white">WIFI MANAGER</text>
  <line x1="290" y1="495" x2="290" y2="535" stroke="#80cbc4" stroke-width="0.6" opacity="0.5"/>
  <text x="400" y="510" text-anchor="middle" fill="#b2ebf2">AP mode  (first boot / provisioning)</text>
  <text x="400" y="526" text-anchor="middle" font-size="9.5" fill="#80deea">hostapd · dnsmasq · hw_mode=g  (Luckfox)     nmcli mode=ap  (Pi 5)</text>
  <line x1="570" y1="495" x2="570" y2="535" stroke="#80cbc4" stroke-width="0.6" opacity="0.5"/>
  <text x="730" y="510" text-anchor="middle" fill="#b2ebf2">Station mode  (after provisioning)</text>
  <text x="730" y="526" text-anchor="middle" font-size="9.5" fill="#80deea">wpa_supplicant · udhcpc  (Luckfox)     nmcli device wifi connect  (Pi 5)</text>

  <!-- WiFi ↔ HTTP API connector -->
  <line x1="136" y1="490" x2="136" y2="468" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════════════════════
       EXTERNAL — below device box
       ════════════════════════════════════════════════════════════════════ -->

  <!-- WiFi cloud pill -->
  <rect x="270" y="572" width="400" height="46" rx="23"
        fill="#e0f2f1" stroke="#00bcd4" stroke-width="2"/>
  <text x="470" y="591" text-anchor="middle" font-size="11" font-weight="700" fill="#00695c">WiFi Network</text>
  <text x="470" y="607" text-anchor="middle" font-size="9.5" fill="#00838f">
    AP: 192.168.4.1  (field provisioning)   ·   Station: DHCP  (home / base network)
  </text>

  <!-- connector: device WiFi Manager → WiFi cloud -->
  <line x1="470" y1="538" x2="470" y2="572" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Phone App -->
  <rect x="688" y="562" width="210" height="70" rx="9"
        fill="#37474f" stroke="#263238" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="793" y="583" text-anchor="middle" font-weight="700" fill="white">PHONE APP</text>
  <line x1="702" y1="589" x2="880" y2="589" stroke="#b0bec5" stroke-width="0.6" opacity="0.5"/>
  <text x="793" y="603" text-anchor="middle" fill="#cfd8dc">REST client  ·  crop viewer</text>
  <text x="793" y="617" text-anchor="middle" fill="#cfd8dc">SSE event listener</text>
  <text x="793" y="630" text-anchor="middle" font-size="9" fill="#90a4ae">POST /api/wifi  →  provision credentials</text>

  <!-- connector: WiFi cloud → Phone App -->
  <line x1="670" y1="595" x2="688" y2="595" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Legend ────────────────────────────────────────────────────────── -->
  <rect x="36" y="650" width="868" height="38" rx="7" fill="#eceff1" stroke="#cfd8dc" stroke-width="1"/>
  <rect x="50"  y="660" width="14" height="14" rx="3" fill="#1565c0"/>
  <text x="70"  y="671" fill="#546e7a">Camera</text>
  <rect x="140" y="660" width="14" height="14" rx="3" fill="#2e7d32"/>
  <text x="160" y="671" fill="#546e7a">Processing</text>
  <rect x="255" y="660" width="14" height="14" rx="3" fill="#ef6c00"/>
  <text x="275" y="671" fill="#546e7a">Saving</text>
  <rect x="345" y="660" width="14" height="14" rx="3" fill="#6a1b9a"/>
  <text x="365" y="671" fill="#546e7a">Storage</text>
  <rect x="435" y="660" width="14" height="14" rx="3" fill="#c62828"/>
  <text x="455" y="671" fill="#546e7a">API / Servers</text>
  <rect x="555" y="660" width="14" height="14" rx="3" fill="#006064"/>
  <text x="575" y="671" fill="#546e7a">WiFi</text>
  <rect x="630" y="660" width="14" height="14" rx="3" fill="#283593"/>
  <text x="650" y="671" fill="#546e7a">Data / Sync</text>
  <rect x="740" y="660" width="14" height="14" rx="3" fill="#37474f"/>
  <text x="760" y="671" fill="#546e7a">External</text>
  <line x1="820" y1="667" x2="850" y2="667" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="858" y="671" fill="#546e7a">internal link</text>

</svg>
