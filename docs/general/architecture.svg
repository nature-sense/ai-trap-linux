<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" width="960" height="780"
     font-family="'Segoe UI', system-ui, sans-serif" font-size="11">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#546e7a"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#546e7a"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#80cbc4"/>
    </marker>
    <marker id="arr-teal-rev" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#80cbc4"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#42a5f5"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00bcd4"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- ── Page background ───────────────────────────────────────────────── -->
  <rect width="960" height="780" fill="#eceff1"/>

  <!-- ── Title ─────────────────────────────────────────────────────────── -->
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="700"
        fill="#1a237e" letter-spacing="0.5">AI Wildlife Trap — System Architecture</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       TRAP DEVICE outer box   x=18 y=44 w=924 h=568  (bottom y=612)
       ══════════════════════════════════════════════════════════════════════ -->
  <rect x="18" y="44" width="924" height="568" rx="14"
        fill="#f5f7fa" stroke="#90a4ae" stroke-width="2" filter="url(#shadow)"/>
  <rect x="18" y="44" width="924" height="32" rx="14" fill="#37474f"/>
  <rect x="18" y="60" width="924" height="16"            fill="#37474f"/>
  <text x="36" y="65" font-size="12" font-weight="700" fill="white">TRAP DEVICE</text>
  <text x="158" y="65" font-size="10" fill="#b0bec5">
    Raspberry Pi 5 (BCM2712 · libcamera · aarch64)
    <tspan fill="#78909c">  /  </tspan>
    Luckfox Pico Zero (RV1106G3 · V4L2 · Cortex-A7 uClibc)
  </text>

  <!-- ══════════════════════════════════════════════════════════════════════
       ROW 1 — Camera pipeline   y 90–205
       ══════════════════════════════════════════════════════════════════════ -->

  <!-- CAMERA -->
  <rect x="36" y="90" width="140" height="115" rx="9"
        fill="#1565c0" stroke="#0d47a1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="106" y="110" text-anchor="middle" font-weight="700" fill="white">CAMERA</text>
  <line x1="52"  y1="116" x2="160" y2="116" stroke="#90caf9" stroke-width="0.6" opacity="0.5"/>
  <text x="106" y="130" text-anchor="middle" fill="#bbdefb">IMX708  (Pi 5)</text>
  <text x="106" y="145" text-anchor="middle" fill="#bbdefb">IMX415  (Luckfox)</text>
  <text x="106" y="160" text-anchor="middle" font-size="9.5" fill="#90caf9">2304×1296 / 1920×1080</text>
  <text x="106" y="175" text-anchor="middle" font-size="9.5" fill="#90caf9">30 fps · NV12</text>
  <text x="106" y="190" text-anchor="middle" font-size="9"   fill="#64b5f6">IR-CUT filter</text>

  <line x1="176" y1="147" x2="196" y2="147" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CAPTURE -->
  <rect x="196" y="102" width="148" height="90" rx="9"
        fill="#1976d2" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="122" text-anchor="middle" font-weight="700" fill="white">CAPTURE</text>
  <line x1="212" y1="128" x2="328" y2="128" stroke="#90caf9" stroke-width="0.6" opacity="0.5"/>
  <text x="270" y="143" text-anchor="middle" fill="#bbdefb">libcamera  (Pi 5)</text>
  <text x="270" y="158" text-anchor="middle" fill="#bbdefb">V4L2 / RKISP  (Luckfox)</text>
  <text x="270" y="174" text-anchor="middle" font-size="9.5" fill="#90caf9">CaptureFrame struct</text>

  <line x1="344" y1="147" x2="366" y2="147" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- INFERENCE -->
  <rect x="366" y="90" width="160" height="115" rx="9"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="446" y="110" text-anchor="middle" font-weight="700" fill="white">INFERENCE</text>
  <line x1="382" y1="116" x2="510" y2="116" stroke="#a5d6a7" stroke-width="0.6" opacity="0.5"/>
  <text x="446" y="131" text-anchor="middle" fill="#c8e6c9">NCNN · YOLO11n</text>
  <text x="446" y="146" text-anchor="middle" fill="#c8e6c9">320 × 320 input</text>
  <text x="446" y="161" text-anchor="middle" font-size="9.5" fill="#a5d6a7">NEON FP16 · static lib</text>
  <text x="446" y="176" text-anchor="middle" font-size="9.5" fill="#a5d6a7">NMS  conf ≥ 0.45</text>
  <text x="446" y="191" text-anchor="middle" font-size="9"   fill="#81c784">anchor-grid decoder</text>

  <line x1="526" y1="147" x2="548" y2="147" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TRACKER -->
  <rect x="548" y="102" width="148" height="90" rx="9"
        fill="#388e3c" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="622" y="122" text-anchor="middle" font-weight="700" fill="white">TRACKER</text>
  <line x1="564" y1="128" x2="680" y2="128" stroke="#a5d6a7" stroke-width="0.6" opacity="0.5"/>
  <text x="622" y="143" text-anchor="middle" fill="#c8e6c9">ByteTracker</text>
  <text x="622" y="158" text-anchor="middle" fill="#c8e6c9">IoU + Kalman filter</text>
  <text x="622" y="174" text-anchor="middle" font-size="9.5" fill="#a5d6a7">track ID · confirmed</text>

  <line x1="696" y1="147" x2="720" y2="147" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CROP SAVER -->
  <rect x="720" y="90" width="172" height="115" rx="9"
        fill="#ef6c00" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="806" y="110" text-anchor="middle" font-weight="700" fill="white">CROP SAVER</text>
  <line x1="736" y1="116" x2="876" y2="116" stroke="#ffe0b2" stroke-width="0.6" opacity="0.5"/>
  <text x="806" y="131" text-anchor="middle" fill="#ffe0b2">JPEG encode  (stb)</text>
  <text x="806" y="146" text-anchor="middle" fill="#ffe0b2">EXIF GPS tagging</text>
  <text x="806" y="161" text-anchor="middle" font-size="9.5" fill="#ffcc80">conf threshold · dedup</text>
  <text x="806" y="176" text-anchor="middle" font-size="9.5" fill="#ffcc80">max saves / track</text>
  <text x="806" y="191" text-anchor="middle" font-size="9"   fill="#ffa726">async write queue</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       ROW 2 — Storage / Sync   y 228–336
       ══════════════════════════════════════════════════════════════════════ -->

  <!-- CropSaver → Storage (straight down) -->
  <line x1="806" y1="205" x2="806" y2="226" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- CropSaver → SyncMgr (diagonal) -->
  <line x1="764" y1="205" x2="624" y2="226" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SYNC MANAGER -->
  <rect x="548" y="228" width="148" height="108" rx="9"
        fill="#ad1457" stroke="#880e4f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="622" y="248" text-anchor="middle" font-weight="700" fill="white">SYNC MANAGER</text>
  <line x1="564" y1="254" x2="680" y2="254" stroke="#f8bbd0" stroke-width="0.6" opacity="0.5"/>
  <text x="622" y="268" text-anchor="middle" fill="#f8bbd0">/api/sync/session</text>
  <text x="622" y="283" text-anchor="middle" fill="#f8bbd0">/api/sync/ack</text>
  <text x="622" y="298" text-anchor="middle" font-size="9.5" fill="#f48fb1">batch transfer + ack</text>
  <text x="622" y="313" text-anchor="middle" font-size="9.5" fill="#f48fb1">auto-delete after ack</text>
  <text x="622" y="328" text-anchor="middle" font-size="9"   fill="#f06292">DELETE after confirm</text>

  <!-- STORAGE -->
  <rect x="720" y="228" width="172" height="108" rx="9"
        fill="#6a1b9a" stroke="#4a148c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="806" y="248" text-anchor="middle" font-weight="700" fill="white">STORAGE</text>
  <line x1="736" y1="254" x2="876" y2="254" stroke="#e1bee7" stroke-width="0.6" opacity="0.5"/>
  <text x="806" y="268" text-anchor="middle" fill="#e1bee7">SQLite · detections.db</text>
  <text x="806" y="283" text-anchor="middle" fill="#e1bee7">crops/  JPEG files</text>
  <text x="806" y="298" text-anchor="middle" font-size="9.5" fill="#ce93d8">track · label · conf · GPS</text>
  <text x="806" y="313" text-anchor="middle" font-size="9.5" fill="#ce93d8">temperature · humidity</text>
  <text x="806" y="328" text-anchor="middle" font-size="9"   fill="#ba68c8">session directories</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       ROW 3 — API servers   y 358–472
       ══════════════════════════════════════════════════════════════════════ -->

  <!-- Row 2 → Row 3 vertical dashed connectors -->
  <line x1="622" y1="336" x2="622" y2="356" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="806" y1="336" x2="806" y2="356" stroke="#546e7a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- HTTP API -->
  <rect x="36" y="358" width="200" height="114" rx="9"
        fill="#c62828" stroke="#b71c1c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="136" y="378" text-anchor="middle" font-weight="700" fill="white">HTTP API  · :8080</text>
  <line x1="52"  y1="384" x2="220" y2="384" stroke="#ffcdd2" stroke-width="0.6" opacity="0.5"/>
  <text x="136" y="399" text-anchor="middle" fill="#ffcdd2">/api/trap  /api/status</text>
  <text x="136" y="413" text-anchor="middle" fill="#ffcdd2">/api/capture  /api/crops</text>
  <text x="136" y="427" text-anchor="middle" fill="#ffcdd2">/api/wifi  /api/wifi/reset</text>
  <text x="136" y="441" text-anchor="middle" font-size="9.5" fill="#ef9a9a">/api/config  /api/sync/*</text>
  <text x="136" y="456" text-anchor="middle" font-size="9"   fill="#e57373">CORS · JSON · markActivity()</text>

  <!-- SSE -->
  <rect x="256" y="358" width="188" height="114" rx="9"
        fill="#d84315" stroke="#bf360c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="378" text-anchor="middle" font-weight="700" fill="white">SSE EVENTS  · :8081</text>
  <line x1="272" y1="384" x2="428" y2="384" stroke="#ffccbc" stroke-width="0.6" opacity="0.5"/>
  <text x="350" y="399" text-anchor="middle" fill="#ffccbc">detection-event</text>
  <text x="350" y="414" text-anchor="middle" fill="#ffccbc">crop-saved</text>
  <text x="350" y="429" text-anchor="middle" fill="#ffccbc">capture-state</text>
  <text x="350" y="445" text-anchor="middle" font-size="9.5" fill="#ffab91">server-sent events</text>
  <text x="350" y="460" text-anchor="middle" font-size="9"   fill="#ff8a65">real-time push · 8 clients</text>

  <!-- MJPEG -->
  <rect x="464" y="358" width="190" height="114" rx="9"
        fill="#bf360c" stroke="#b71c1c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="559" y="378" text-anchor="middle" font-weight="700" fill="white">MJPEG STREAM  · :9000</text>
  <line x1="480" y1="384" x2="638" y2="384" stroke="#ffccbc" stroke-width="0.6" opacity="0.5"/>
  <text x="559" y="399" text-anchor="middle" fill="#ffccbc">live video preview</text>
  <text x="559" y="414" text-anchor="middle" fill="#ffccbc">640×480 · JPEG 75%</text>
  <text x="559" y="429" text-anchor="middle" font-size="9.5" fill="#ffab91">multi-client</text>
  <text x="559" y="445" text-anchor="middle" font-size="9.5" fill="#ffab91">NV12 → JPEG per frame</text>
  <text x="559" y="460" text-anchor="middle" font-size="9"   fill="#ff8a65">async frame push</text>

  <!-- STORAGE / SYNC / DB (API layer) -->
  <rect x="674" y="358" width="248" height="114" rx="9"
        fill="#283593" stroke="#1a237e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="798" y="378" text-anchor="middle" font-weight="700" fill="white">STORAGE · SYNC · DB</text>
  <line x1="690" y1="384" x2="906" y2="384" stroke="#c5cae9" stroke-width="0.6" opacity="0.5"/>
  <text x="798" y="399" text-anchor="middle" fill="#c5cae9">SQLite  ·  detections.db</text>
  <text x="798" y="414" text-anchor="middle" fill="#c5cae9">crops/  JPEG sessions</text>
  <text x="798" y="429" text-anchor="middle" font-size="9.5" fill="#9fa8da">SyncManager → HTTP API</text>
  <text x="798" y="444" text-anchor="middle" font-size="9.5" fill="#9fa8da">/api/sync/*  manifest + ack</text>
  <text x="798" y="458" text-anchor="middle" font-size="9"   fill="#7986cb">auto-delete after phone acks</text>

  <!-- Horizontal dashed feeds into Storage/Sync/DB box -->
  <line x1="548" y1="415" x2="464" y2="415" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="720" y1="415" x2="674" y2="415" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════════
       ROW 4 — Connectivity   y 494–586
       BLE GATT: x=36  w=400  right=436
       gap 24px
       WiFi Mgr: x=460  w=462  right=922
       ══════════════════════════════════════════════════════════════════════ -->

  <!-- HTTP API ↓ dashed to WiFi Manager (activity marking) -->
  <line x1="136" y1="472" x2="136" y2="488" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="136" y1="488" x2="580" y2="488" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="580" y1="488" x2="580" y2="492" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>

  <!-- BLE GATT SERVER -->
  <rect x="36" y="494" width="400" height="92" rx="9"
        fill="#01579b" stroke="#0d47a1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="236" y="514" text-anchor="middle" font-weight="700" fill="white">BLE GATT SERVER</text>
  <line x1="52"  y1="520" x2="420" y2="520" stroke="#b3e5fc" stroke-width="0.6" opacity="0.5"/>
  <text x="236" y="534" text-anchor="middle" fill="#b3e5fc">Service 0xFFF0 · AI-Trap-&lt;id&gt; · 100 ms · ADV_IND</text>
  <text x="236" y="549" text-anchor="middle" fill="#b3e5fc">0xFFF1  WiFi State  —  read + notify  (JSON)</text>
  <text x="236" y="564" text-anchor="middle" fill="#b3e5fc">0xFFF2  WiFi Command  —  write  (JSON)</text>
  <text x="236" y="579" text-anchor="middle" font-size="9.5" fill="#81d4fa">HCI_CHANNEL_RAW · L2CAP ATT CID 4 · bluetoothd masked</text>

  <!-- Bidirectional arrow BLE GATT ↔ WiFi Manager -->
  <!-- commands: BLE → WiFi -->
  <line x1="438" y1="535" x2="458" y2="535" stroke="#80cbc4" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <!-- notifications: WiFi → BLE -->
  <line x1="458" y1="544" x2="438" y2="544" stroke="#80cbc4" stroke-width="1.5" marker-end="url(#arr-teal-rev)"/>
  <text x="448" y="531" text-anchor="middle" font-size="7.5" fill="#546e7a">cmds</text>
  <text x="448" y="553" text-anchor="middle" font-size="7.5" fill="#546e7a">notify</text>

  <!-- WIFI MANAGER -->
  <rect x="460" y="494" width="462" height="92" rx="9"
        fill="#006064" stroke="#004d40" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="691" y="514" text-anchor="middle" font-weight="700" fill="white">WIFI MANAGER</text>
  <line x1="476" y1="520" x2="906" y2="520" stroke="#80cbc4" stroke-width="0.6" opacity="0.5"/>
  <text x="691" y="534" text-anchor="middle" fill="#b2ebf2">AP mode · Station mode · Off  (power save)</text>
  <text x="691" y="549" text-anchor="middle" fill="#b2ebf2">Inactivity timer: auto-shutdown after 10 min idle · BLE notified</text>
  <text x="691" y="563" text-anchor="middle" font-size="9.5" fill="#80deea">Pi 5:     nmcli hotspot (AP) · nmcli connect (station) · nmcli radio off</text>
  <text x="691" y="577" text-anchor="middle" font-size="9.5" fill="#80deea">Luckfox: hostapd+dnsmasq (AP) · wpa_supplicant+udhcpc (station)</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       EXTERNAL — below trap box (trap bottom = y 612)
       ══════════════════════════════════════════════════════════════════════ -->

  <!-- WiFi Manager → WiFi Network -->
  <line x1="660" y1="586" x2="470" y2="630" stroke="#00bcd4" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-cyan)"/>

  <!-- BLE GATT → Phone App (BLE advertising / ATT) -->
  <line x1="280" y1="586" x2="704" y2="634" stroke="#42a5f5" stroke-width="1.5"
        stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="474" y="616" text-anchor="middle" font-size="9.5" font-style="italic" fill="#1565c0">BLE (advertising · ATT protocol)</text>

  <!-- WiFi Network pill -->
  <rect x="244" y="632" width="380" height="48" rx="24"
        fill="#e0f2f1" stroke="#00bcd4" stroke-width="2"/>
  <text x="434" y="651" text-anchor="middle" font-size="11" font-weight="700" fill="#00695c">WiFi Network</text>
  <text x="434" y="668" text-anchor="middle" font-size="9.5" fill="#00838f">AP: 192.168.4.1  (field provisioning)   ·   Station: DHCP  (home / base)</text>

  <!-- WiFi Network → Phone App -->
  <line x1="624" y1="656" x2="702" y2="672" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phone App -->
  <rect x="702" y="626" width="240" height="106" rx="9"
        fill="#37474f" stroke="#263238" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="822" y="646" text-anchor="middle" font-weight="700" fill="white">PHONE APP</text>
  <line x1="718" y1="652" x2="926" y2="652" stroke="#b0bec5" stroke-width="0.6" opacity="0.5"/>
  <text x="822" y="666" text-anchor="middle" fill="#cfd8dc">BLE: WiFi provisioning</text>
  <text x="822" y="681" text-anchor="middle" fill="#cfd8dc">WiFi: REST · SSE · MJPEG</text>
  <text x="822" y="696" text-anchor="middle" font-size="9.5" fill="#b0bec5">crop sync · live preview</text>
  <text x="822" y="710" text-anchor="middle" font-size="9"   fill="#90a4ae">BLE → start_ap → join WiFi → use API</text>
  <text x="822" y="724" text-anchor="middle" font-size="9"   fill="#90a4ae">POST /api/wifi → station creds</text>

  <!-- ── Legend ────────────────────────────────────────────────────────── -->
  <rect x="36" y="748" width="888" height="24" rx="6" fill="#eceff1" stroke="#cfd8dc" stroke-width="1"/>
  <rect x="50"  y="758" width="12" height="12" rx="2" fill="#1565c0"/>
  <text x="68"  y="768" fill="#546e7a">Camera</text>
  <rect x="130" y="758" width="12" height="12" rx="2" fill="#2e7d32"/>
  <text x="148" y="768" fill="#546e7a">Processing</text>
  <rect x="238" y="758" width="12" height="12" rx="2" fill="#ef6c00"/>
  <text x="256" y="768" fill="#546e7a">Saving</text>
  <rect x="314" y="758" width="12" height="12" rx="2" fill="#6a1b9a"/>
  <text x="332" y="768" fill="#546e7a">Storage</text>
  <rect x="394" y="758" width="12" height="12" rx="2" fill="#c62828"/>
  <text x="412" y="768" fill="#546e7a">API/Servers</text>
  <rect x="500" y="758" width="12" height="12" rx="2" fill="#01579b"/>
  <text x="518" y="768" fill="#546e7a">BLE</text>
  <rect x="556" y="758" width="12" height="12" rx="2" fill="#006064"/>
  <text x="574" y="768" fill="#546e7a">WiFi</text>
  <rect x="618" y="758" width="12" height="12" rx="2" fill="#283593"/>
  <text x="636" y="768" fill="#546e7a">Data/Sync</text>
  <rect x="716" y="758" width="12" height="12" rx="2" fill="#37474f"/>
  <text x="734" y="768" fill="#546e7a">External</text>
  <line x1="800" y1="764" x2="832" y2="764" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="840" y="768" fill="#546e7a">internal link</text>

</svg>
