name: Build · Raspberry Pi 5 (aarch64)

# Builds a self-contained yolo_libcamera binary for Raspberry Pi 5.
#
# What gets statically linked (no install needed on the Pi):
#   NCNN (built from source, Cortex-A76 + dotprod + fp16 tuned)
#   SQLite3 (built from source)
#   libstdc++, libgcc_s
#
# What stays dynamic (always present on Raspberry Pi OS):
#   libcamera  (system camera stack)
#   glibc

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CROSS:          aarch64-linux-gnu
  SYSROOT:        ${{ github.workspace }}/sysroot/pi5
  NCNN_VERSION:   "20240410"
  SQLITE_VERSION: "3450100"
  SQLITE_YEAR:    "2024"

jobs:
  build-pi5:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ── Toolchain + build tools ────────────────────────────────────────────
      - name: Install cross toolchain and build tools
        run: |
          sudo apt-get update -qq
          # Do NOT install pkg-config — the runner ships pkgconf which provides
          # the cross-compilation wrapper infrastructure. Installing pkg-config
          # removes pkgconf and breaks that setup.
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            cmake ninja-build \
            curl ca-certificates python3-pip
          # Install a recent meson via pip (apt ships 0.61 which has a bug
          # generating sizeof(void*) probes in cross-compilation mode).
          sudo pip3 install --quiet 'meson>=1.3'
          echo "meson: $(/usr/local/bin/meson --version) at $(which meson)"

      # ── libcamera from Raspberry Pi OS ────────────────────────────────────
      # Ubuntu 22.04 ships libcamera 0.0.4 which has incompatible headers
      # (e.g. no framebuffer.h, double-nested include paths). We fetch the
      # packages directly from the Pi OS Bookworm repo and extract them into
      # the sysroot — no installation so no apt dependency conflicts.
      - name: Fetch libcamera from Raspberry Pi OS into sysroot
        run: |
          # Import Pi OS signing key
          curl -fsSL https://archive.raspberrypi.com/debian/raspberrypi.gpg.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/raspberrypi-keyring.gpg > /dev/null

          # Add Pi OS bookworm repo (arm64 only)
          echo "deb [arch=arm64 signed-by=/usr/share/keyrings/raspberrypi-keyring.gpg] http://archive.raspberrypi.com/debian/ bookworm main" \
            | sudo tee /etc/apt/sources.list.d/raspberrypi.list

          # Also need base Debian Bookworm for libcamera's dependencies
          echo "deb [arch=arm64] http://deb.debian.org/debian bookworm main" \
            | sudo tee /etc/apt/sources.list.d/debian-bookworm-arm64.list

          sudo dpkg --add-architecture arm64
          sudo apt-get update -qq

          # Download .deb files only — do not install, to avoid pulling in
          # arm64 runtime deps that conflict with the amd64 build environment.
          mkdir -p ${{ env.SYSROOT }}
          cd /tmp
          apt-get download \
            libcamera-dev:arm64 \
            libcamera0.3:arm64 || apt-get download libcamera-dev:arm64 libcamera0:arm64
          for deb in libcamera*.deb; do
            dpkg-deb -x "$deb" ${{ env.SYSROOT }}
          done

          echo "=== libcamera libs in sysroot ==="
          find ${{ env.SYSROOT }}/usr/lib -name "libcamera*" 2>/dev/null | head -10
          echo "=== libcamera headers (framebuffer) ==="
          find ${{ env.SYSROOT }}/usr/include -name "framebuffer.h" 2>/dev/null
          echo "=== libcamera .pc files ==="
          find ${{ env.SYSROOT }} -name "*.pc" | grep -i camera

      # ── pkg-config wrapper ─────────────────────────────────────────────────
      # Points to the Pi OS libcamera .pc files extracted into the sysroot.
      # PKG_CONFIG_SYSROOT_DIR rewrites absolute paths in .pc Cflags/Libs
      # so they point into the sysroot rather than the host system.
      - name: Create aarch64 pkg-config wrapper
        run: |
          SYSROOT="${{ env.SYSROOT }}"
          WRAPPER="/usr/local/bin/${{ env.CROSS }}-pkg-config"
          {
            echo '#!/bin/bash'
            echo 'export PKG_CONFIG_DIR='
            echo "export PKG_CONFIG_SYSROOT_DIR=${SYSROOT}"
            echo "export PKG_CONFIG_LIBDIR=${SYSROOT}/usr/lib/aarch64-linux-gnu/pkgconfig:${SYSROOT}/usr/lib/pkgconfig:/usr/share/pkgconfig"
            echo 'exec pkg-config "$@"'
          } | sudo tee "$WRAPPER" > /dev/null
          sudo chmod +x "$WRAPPER"
          echo "=== pkg-config wrapper ==="
          cat "$WRAPPER"

      # ── Sysroot cache (NCNN + SQLite3) ────────────────────────────────────
      - name: Cache sysroot
        id: cache-sysroot
        uses: actions/cache@v4
        with:
          path: ${{ env.SYSROOT }}
          key: pi5-sysroot-ncnn-${{ env.NCNN_VERSION }}-sqlite-${{ env.SQLITE_VERSION }}-v1

      # ── SQLite3 ───────────────────────────────────────────────────────────
      - name: Build SQLite3
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ env.SYSROOT }}
          curl -fsSL "https://www.sqlite.org/${{ env.SQLITE_YEAR }}/sqlite-autoconf-${{ env.SQLITE_VERSION }}.tar.gz" | tar xz
          cd sqlite-autoconf-${{ env.SQLITE_VERSION }}
          ./configure \
            --host=${{ env.CROSS }} \
            --prefix=/usr \
            --enable-static \
            --disable-shared \
            CC=${{ env.CROSS }}-gcc \
            CFLAGS="-march=armv8.2-a -mtune=cortex-a76 -O2"
          make -j$(nproc)
          make DESTDIR=${{ env.SYSROOT }} install
          cd .. && rm -rf sqlite-autoconf-${{ env.SQLITE_VERSION }}

      # ── NCNN ──────────────────────────────────────────────────────────────
      - name: Build NCNN
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.NCNN_VERSION }} \
            https://github.com/Tencent/ncnn.git ncnn-src
          cmake -S ncnn-src -B ncnn-build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=${{ env.CROSS }}-gcc \
            -DCMAKE_CXX_COMPILER=${{ env.CROSS }}-g++ \
            -DCMAKE_C_FLAGS="-march=armv8.2-a+dotprod+fp16 -mtune=cortex-a76 -O2" \
            -DCMAKE_CXX_FLAGS="-march=armv8.2-a+dotprod+fp16 -mtune=cortex-a76 -O2" \
            -DCMAKE_INSTALL_PREFIX=${{ env.SYSROOT }}/usr \
            -DNCNN_TARGET_ARCH=aarch64 \
            -DNCNN_BUILD_TESTS=OFF \
            -DNCNN_BUILD_EXAMPLES=OFF \
            -DNCNN_BUILD_TOOLS=OFF \
            -DNCNN_VULKAN=OFF \
            -DNCNN_SHARED_LIB=OFF \
            -DNCNN_BUILD_BENCHMARK=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build ncnn-build -j$(nproc)
          cmake --install ncnn-build
          rm -rf ncnn-src ncnn-build

      # ── Generate CI cross file ─────────────────────────────────────────────
      - name: Generate CI cross file
        run: |
          BIN="/usr/bin/${{ env.CROSS }}"
          SYSROOT="${{ env.SYSROOT }}"
          PKGCONFIG="/usr/local/bin/${{ env.CROSS }}-pkg-config"
          OUT="cross/pi5-aarch64-ci.ini"
          {
            echo "[binaries]"
            echo "c          = '${BIN}-gcc'"
            echo "cpp        = '${BIN}-g++'"
            echo "ar         = '${BIN}-ar'"
            echo "strip      = '${BIN}-strip'"
            echo "objcopy    = '${BIN}-objcopy'"
            echo "pkg-config = '${PKGCONFIG}'"
            echo ""
            echo "[host_machine]"
            echo "system     = 'linux'"
            echo "cpu_family = 'aarch64'"
            echo "cpu        = 'cortex-a76'"
            echo "endian     = 'little'"
            echo ""
            echo "[properties]"
            echo "pkg_config_libdir = '${SYSROOT}/usr/lib/aarch64-linux-gnu/pkgconfig:${SYSROOT}/usr/lib/pkgconfig:/usr/share/pkgconfig'"
            echo "cmake_prefix_path = ['${SYSROOT}/usr']"
          } > "$OUT"
          echo "=== Generated cross file ==="
          cat "$OUT"

      # ── Meson configure ────────────────────────────────────────────────────
      - name: Configure (meson)
        run: |
          /usr/local/bin/meson setup build-pi5 \
            --cross-file cross/pi5-aarch64-ci.ini \
            -Dtarget=libcamera \
            -Dpi5_sysroot=${{ env.SYSROOT }} \
            --buildtype=release

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (ninja)
        run: ninja -C build-pi5

      # ── Strip ──────────────────────────────────────────────────────────────
      - name: Strip binary
        run: ${{ env.CROSS }}-strip build-pi5/yolo_libcamera

      # ── Artifact ───────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo_libcamera-pi5-aarch64
          path: build-pi5/yolo_libcamera
          retention-days: 30
