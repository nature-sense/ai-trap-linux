# ─────────────────────────────────────────────────────────────────────────────
#  build-luckfox.yml
#
#  Cross-compiles yolo_v4l2 for the Luckfox Pico Zero (RV1106G3, Cortex-A7)
#  on a standard ubuntu-22.04 GitHub-hosted runner.
#
#  Stages
#  ──────
#  1. Toolchain   — sparse-clone the Luckfox SDK, run env_install_toolchain.sh
#                   Result cached by toolchain commit SHA so re-downloads only
#                   when Luckfox push a new toolchain.
#  2. Sysroot     — cross-build SQLite3, fetch RKNN mini-runtime + headers,
#                   install into sysroot/luckfox/  Result cached by dep
#                   versions so a full rebuild only triggers when they change.
#  3. App build   — meson + ninja, using a CI-generated cross file that
#                   substitutes real workspace paths.
#  4. Artifact    — stripped yolo_v4l2 binary uploaded for 30 days.
#  5. Release     — on v* tags: bundle binary + models + config + init scripts
#                   into ai-trap-luckfox-<version>.tar.gz and publish a
#                   GitHub Release.  Install on device with:
#                     bash scripts/luckfox-install.sh
# ─────────────────────────────────────────────────────────────────────────────

name: Build · Luckfox Pico Zero

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CROSS:          arm-rockchip830-linux-uclibcgnueabihf
  TOOLCHAIN_DIR:  ${{ github.workspace }}/toolchain/arm-rockchip830-linux-uclibcgnueabihf
  SYSROOT:        ${{ github.workspace }}/sysroot/luckfox
  SQLITE_VERSION: 3510300
  SQLITE_YEAR:    2026
  RKNN_VERSION:   v2.3.2
  ARM_FLAGS:      -march=armv7-a -mtune=cortex-a7 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────

      - name: Checkout source
        uses: actions/checkout@v4

      # ── Host tools ──────────────────────────────────────────────────────────

      - name: Install host build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build meson pkg-config \
            curl ca-certificates git \
            libbluetooth-dev

      # ── Toolchain ───────────────────────────────────────────────────────────
      #
      # Sparse-clone only the toolchain directory from the Luckfox SDK, then
      # run env_install_toolchain.sh which downloads the actual compiler
      # binaries.  Cache keyed on the SDK commit so we only re-download when
      # Luckfox update the toolchain.

      - name: Get Luckfox SDK HEAD commit
        id: sdk-commit
        run: |
          SHA=$(git ls-remote https://github.com/LuckfoxTECH/luckfox-pico.git HEAD | cut -f1)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: luckfox-toolchain-${{ steps.sdk-commit.outputs.sha }}

      - name: Download Luckfox toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/LuckfoxTECH/luckfox-pico.git luckfox-sdk
          cd luckfox-sdk
          git sparse-checkout set \
            tools/linux/toolchain/${{ env.CROSS }}
          # env_install_toolchain.sh may download additional blobs;
          # run it if present, otherwise assume sparse-checkout was enough.
          if [ -f env_install_toolchain.sh ]; then
            bash env_install_toolchain.sh || true
          fi
          TOOLCHAIN_SRC=tools/linux/toolchain/${{ env.CROSS }}
          if [ -d "$TOOLCHAIN_SRC" ]; then
            mkdir -p "${{ env.TOOLCHAIN_DIR }}"
            cp -a "$TOOLCHAIN_SRC"/. "${{ env.TOOLCHAIN_DIR }}/"
          else
            echo "ERROR: toolchain directory not found after SDK clone" >&2
            ls tools/linux/toolchain/ || true
            exit 1
          fi
          cd ..
          rm -rf luckfox-sdk

      - name: Verify toolchain
        run: |
          "${{ env.TOOLCHAIN_DIR }}/bin/${{ env.CROSS }}-gcc" --version

      # ── Sysroot (SQLite3 + NCNN) ────────────────────────────────────────────

      - name: Cache sysroot
        id: cache-sysroot
        uses: actions/cache@v4
        with:
          path: ${{ env.SYSROOT }}
          key: luckfox-sysroot-sqlite${{ env.SQLITE_VERSION }}-rknn${{ env.RKNN_VERSION }}-v1

      # ── BlueZ headers ───────────────────────────────────────────────────────
      # Copied from the host libbluetooth-dev package (installed above).
      # BlueZ headers are pure C with no arch-specific content, so the host
      # x86-64 headers are correct for cross-compilation to armv7.
      # Done AFTER cache restore so headers are always present whether the
      # sysroot was restored from cache or freshly built.

      - name: Copy BlueZ headers into sysroot
        run: |
          mkdir -p ${{ env.SYSROOT }}/usr/include/bluetooth
          cp -v /usr/include/bluetooth/bluetooth.h ${{ env.SYSROOT }}/usr/include/bluetooth/
          cp -v /usr/include/bluetooth/hci.h       ${{ env.SYSROOT }}/usr/include/bluetooth/
          cp -v /usr/include/bluetooth/hci_lib.h   ${{ env.SYSROOT }}/usr/include/bluetooth/
          cp -v /usr/include/bluetooth/l2cap.h     ${{ env.SYSROOT }}/usr/include/bluetooth/
          echo "=== BlueZ headers installed ==="
          ls ${{ env.SYSROOT }}/usr/include/bluetooth/

      - name: Cross-build SQLite3
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        run: |
          GCC="${{ env.TOOLCHAIN_DIR }}/bin/${{ env.CROSS }}-gcc"
          curl -fsSL \
            https://www.sqlite.org/${{ env.SQLITE_YEAR }}/sqlite-autoconf-${{ env.SQLITE_VERSION }}.tar.gz \
            | tar xz
          cd sqlite-autoconf-${{ env.SQLITE_VERSION }}
          ./configure \
            --host=${{ env.CROSS }} \
            --prefix=/usr \
            --enable-static \
            --disable-shared \
            CC="$GCC" \
            CFLAGS="${{ env.ARM_FLAGS }}"
          make -j$(nproc)
          make DESTDIR="${{ env.SYSROOT }}" install
          cd ..
          rm -rf sqlite-autoconf-${{ env.SQLITE_VERSION }}

      - name: Fetch RKNN mini-runtime
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        run: |
          # RV1106 uses the RKNN mini-runtime (librknnmrt.so), not the full
          # librknnrt.so (which is for higher-end chips like RK3588).
          # armhf-uclibc: correct variant for Luckfox Pico Zero (Cortex-A7, uClibc).
          # VERSION PINNING: must match the toolkit2 version used to convert model.rknn.
          RKNN_BASE="https://raw.githubusercontent.com/airockchip/rknn-toolkit2/${{ env.RKNN_VERSION }}/rknpu2/runtime/Linux/librknn_api"
          mkdir -p "${{ env.SYSROOT }}/usr/lib" "${{ env.SYSROOT }}/usr/include"
          curl -fL "${RKNN_BASE}/armhf-uclibc/librknnmrt.so" \
               -o "${{ env.SYSROOT }}/usr/lib/librknnmrt.so"
          curl -fL "${RKNN_BASE}/include/rknn_api.h" \
               -o "${{ env.SYSROOT }}/usr/include/rknn_api.h"
          LIB_VER="$(strings "${{ env.SYSROOT }}/usr/lib/librknnmrt.so" | grep 'librknnmrt version:' || true)"
          echo "librknnmrt.so → ${{ env.SYSROOT }}/usr/lib/  (${LIB_VER})"

      # ── Generate cross file with real CI paths ──────────────────────────────
      #
      # The checked-in cross/luckfox-rv1106.ini has paths for local dev.
      # We generate a fresh one here so meson always gets the right paths
      # regardless of runner home directory.

      - name: Generate CI cross file
        run: |
          BIN="${{ env.TOOLCHAIN_DIR }}/bin/${{ env.CROSS }}"
          SYSROOT="${{ env.SYSROOT }}"
          PKGCONFIG="/usr/local/bin/${{ env.CROSS }}-pkg-config"
          OUT="cross/luckfox-rv1106-ci.ini"
          {
            echo "[binaries]"
            echo "c          = '${BIN}-gcc'"
            echo "cpp        = '${BIN}-g++'"
            echo "ar         = '${BIN}-ar'"
            echo "strip      = '${BIN}-strip'"
            echo "objcopy    = '${BIN}-objcopy'"
            echo "pkg-config = 'false'"
            echo ""
            echo "[host_machine]"
            echo "system     = 'linux'"
            echo "cpu_family = 'arm'"
            echo "cpu        = 'cortex-a7'"
            echo "endian     = 'little'"
            echo ""
            echo "[properties]"
            echo "sys_root          = '${SYSROOT}'"
            echo "pkg_config_libdir = '${SYSROOT}/usr/lib/pkgconfig:${SYSROOT}/usr/share/pkgconfig'"
            echo "cmake_prefix_path = ['${SYSROOT}/usr']"
            echo ""
            echo "[built-in options]"
            echo "cpp_args = ['-isystem', '${SYSROOT}/usr/include']"
            echo "c_args   = ['-isystem', '${SYSROOT}/usr/include']"
          } > "$OUT"
          echo "=== Generated cross file ==="
          cat "$OUT"

      # ── Meson configure + build ─────────────────────────────────────────────

      - name: Verify BlueZ headers in sysroot
        run: |
          echo "=== Bluetooth headers in sysroot ==="
          ls -la ${{ env.SYSROOT }}/usr/include/bluetooth/ || echo "MISSING - bluetooth dir not found"
          echo "=== Cross file contents ==="
          cat cross/luckfox-rv1106-ci.ini

      - name: Configure (meson)
        run: |
          meson setup build-luckfox \
            --cross-file cross/luckfox-rv1106-ci.ini \
            -Dtarget=v4l2 \
            -Dluckfox_sysroot=${{ env.SYSROOT }} \
            --buildtype=release

      - name: Build (ninja)
        run: ninja -C build-luckfox

      # ── Strip + upload ───────────────────────────────────────────────────────

      - name: Strip binary
        run: |
          "${{ env.TOOLCHAIN_DIR }}/bin/${{ env.CROSS }}-strip" \
            build-luckfox/yolo_v4l2

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: yolo_v4l2-rv1106-${{ github.sha }}
          path: build-luckfox/yolo_v4l2
          retention-days: 30

  # ── Release (v* tags only) ─────────────────────────────────────────────────
  #
  # Bundles the binary with model.rknn, librknnmrt.so, production config, and
  # init scripts into a single tarball and publishes a GitHub Release.
  # Install on a flashed board with: bash scripts/luckfox-install.sh

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: yolo_v4l2-rv1106-${{ github.sha }}
          path: dist/

      - name: Fetch RKNN runtime for release bundle
        run: |
          RKNN_BASE="https://raw.githubusercontent.com/airockchip/rknn-toolkit2/${{ env.RKNN_VERSION }}/rknpu2/runtime/Linux/librknn_api"
          curl -fL "${RKNN_BASE}/armhf-uclibc/librknnmrt.so" -o dist/librknnmrt.so

      - name: Build release package
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="ai-trap-luckfox-${VERSION}"
          mkdir -p "${PKG}"

          # Binary
          cp dist/yolo_v4l2 "${PKG}/"
          chmod +x "${PKG}/yolo_v4l2"

          # RKNN model + runtime
          cp firmware/models/yolo11n-320/model.rknn "${PKG}/"
          cp dist/librknnmrt.so "${PKG}/"

          # Production config and init scripts
          cp package/luckfox/trap_config.toml "${PKG}/"
          cp package/luckfox/S50wifi          "${PKG}/"
          cp package/luckfox/S99trap          "${PKG}/"
          chmod +x "${PKG}/S50wifi" "${PKG}/S99trap"

          # Version file
          echo "${VERSION}" > "${PKG}/VERSION"

          tar -czf "${PKG}.tar.gz" "${PKG}/"
          echo "## Package contents"   >> release_notes.md
          echo '```' >> release_notes.md
          tar -tzf "${PKG}.tar.gz"     >> release_notes.md
          echo '```' >> release_notes.md
          echo ""                      >> release_notes.md
          echo "**Size:** $(du -sh ${PKG}.tar.gz | cut -f1)" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ai-trap Luckfox ${{ github.ref_name }}"
          body_path: release_notes.md
          body: |
            ## Installation

            On a Mac with a freshly flashed Luckfox Pico Zero connected via USB:

            ```bash
            bash scripts/luckfox-install.sh
            bash scripts/luckfox-wifi-setup.sh "YourSSID" "YourPassword"
            ```

            Or run the full end-to-end setup from scratch:

            ```bash
            bash scripts/luckfox-setup.sh "YourSSID" "YourPassword"
            ```

            See [luckfox-development-guide.md](docs/luckfox/luckfox-development-guide.md) for full details.
          files: ai-trap-luckfox-${{ github.ref_name }}.tar.gz
          fail_on_unmatched_files: true
