# ─────────────────────────────────────────────────────────────────────────────
#  convert-model.yml
#
#  Triggered when firmware/models/yolo11n-320/model.pt changes on main.
#  Converts the source .pt into all deployment formats and commits them back.
#
#  Outputs (committed to firmware/models/yolo11n-320/):
#    model.onnx          intermediate — also used by the Mac Docker conversion
#    model.ncnn.param    ncnn CPU build (yolo_v4l2 default)
#    model.ncnn.bin      ncnn CPU build
#    model.rknn          RKNN NPU build (yolo_v4l2 -Duse_rknn=true)
#
#  INT8 vs fp16 RKNN:
#    If firmware/models/calibration/ contains JPEG/PNG images the RKNN model
#    is built INT8 (better NPU throughput).  Otherwise it falls back to fp16.
#    Commit calibration images to that directory to enable INT8 in CI.
#
#  Manual trigger:
#    Actions → Convert model → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Convert model

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/models/yolo11n-320/model.pt'
      - 'firmware/models/calibration/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────

      - name: Checkout
        uses: actions/checkout@v4

      # ── Python + pip cache ──────────────────────────────────────────────────

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: model-convert-pip-${{ hashFiles('.github/workflows/convert-model.yml') }}

      - name: Install dependencies
        run: |
          pip install --quiet \
            "numpy<2" \
            ultralytics \
            onnx \
            onnxruntime \
            rknn-toolkit2

      # ── ncnn + ONNX export ──────────────────────────────────────────────────

      - name: Export ncnn and ONNX from model.pt
        run: |
          python - <<'EOF'
          from ultralytics import YOLO
          import shutil, glob, pathlib

          pt = 'firmware/models/yolo11n-320/model.pt'
          out = pathlib.Path('firmware/models/yolo11n-320')

          model = YOLO(pt)

          # ncnn export — Ultralytics writes to {stem}_ncnn_model/ next to the .pt
          model.export(format='ncnn', imgsz=320)
          ncnn_dir = out / 'model_ncnn_model'
          shutil.copy(next(ncnn_dir.glob('*.param')), out / 'model.ncnn.param')
          shutil.copy(next(ncnn_dir.glob('*.bin')),   out / 'model.ncnn.bin')

          # ONNX export — written as model.onnx next to the .pt
          model.export(format='onnx', imgsz=320, simplify=True, opset=12)

          print('ncnn and ONNX exports complete')
          EOF

      # ── RKNN conversion ─────────────────────────────────────────────────────

      - name: Convert ONNX to RKNN
        run: |
          CALIB=firmware/models/calibration
          ONNX=firmware/models/yolo11n-320/model.onnx
          RKNN=firmware/models/yolo11n-320/model.rknn

          if [ -d "$CALIB" ] && ls "$CALIB"/*.jpg "$CALIB"/*.png &>/dev/null 2>&1; then
            echo "INT8 conversion using calibration images from $CALIB"
            python scripts/convert_rknn.py "$ONNX" "$RKNN" "$CALIB"
          else
            echo "fp16 conversion (add images to $CALIB for INT8)"
            python scripts/convert_rknn.py "$ONNX" "$RKNN"
          fi

      # ── Commit outputs ──────────────────────────────────────────────────────

      - name: Commit converted model files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            firmware/models/yolo11n-320/model.ncnn.param \
            firmware/models/yolo11n-320/model.ncnn.bin \
            firmware/models/yolo11n-320/model.onnx \
            firmware/models/yolo11n-320/model.rknn

          if git diff --cached --quiet; then
            echo "No changes to commit — model outputs are already up to date"
          else
            git commit -m "chore: regenerate model outputs from model.pt [skip ci]"
            git push
          fi
